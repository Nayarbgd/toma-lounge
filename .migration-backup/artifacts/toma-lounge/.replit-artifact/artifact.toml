kind = "web"
previewPath = "/"
title = "Toma Lounge"
version = "1.0.0"
id = "artifacts/toma-lounge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21968

[services.development]
run = "cd /home/runner/workspace && pnpm --filter @workspace/toma-lounge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/toma-lounge", "run", "build" ]
publicDir = "artifacts/toma-lounge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21968"
BASE_PATH = "/"
